# Pre-commit hooks configuration for Gibson Framework
# Includes schema synchronization checks

repos:
  # Schema synchronization check
  - repo: local
    hooks:
      - id: check-schema-sync
        name: Check Schema Synchronization
        entry: python scripts/sync_schemas.py --dry-run
        language: system
        pass_filenames: false
        files: gibson/models/payload\.py$
        description: Verify schemas are synchronized with PayloadModel changes

      - id: validate-migrations
        name: Validate Migration Scripts
        entry: python -m gibson.cli.main schema validate
        language: system
        pass_filenames: false
        files: gibson/migrations/.*\.py$
        description: Validate migration scripts for safety and correctness

  # Python code quality
  - repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
      - id: black
        language_version: python3.11

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.1.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, sqlalchemy, types-PyYAML]
        args: [--ignore-missing-imports]

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: [-r, gibson/, -ll]
        exclude: tests/

  # YAML validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: detect-private-key

  # Documentation
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        files: gibson/core/schema_sync/.*\.py$
        args: [--convention=google]

  # Schema-specific hooks
  - repo: local
    hooks:
      - id: generate-schema-docs
        name: Generate Schema Documentation
        entry: python -m gibson.cli.main schema generate --output schemas/
        language: system
        pass_filenames: false
        files: gibson/models/payload\.py$
        description: Auto-generate schema documentation

      - id: check-breaking-changes
        name: Check for Breaking Changes
        entry: python scripts/check_breaking_changes.py
        language: system
        pass_filenames: false
        files: gibson/models/payload\.py$
        description: Alert on breaking schema changes

      - id: validate-schema-version
        name: Validate Schema Version
        entry: python scripts/validate_schema_version.py
        language: system
        pass_filenames: false
        files: gibson/models/payload\.py$
        description: Ensure schema version is properly incremented

# Configuration
default_language_version:
  python: python3.11

fail_fast: false
exclude: |
  (?x)^(
    .*\.egg-info/.*|
    \.git/.*|
    \.mypy_cache/.*|
    \.pytest_cache/.*|
    \.ruff_cache/.*|
    __pycache__/.*|
    build/.*|
    dist/.*|
    htmlcov/.*|
    venv/.*|
    \.venv/.*
  )$