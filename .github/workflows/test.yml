name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 6 AM UTC
    - cron: '0 6 * * *'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        exclude:
          # Reduce matrix size for faster CI
          - os: windows-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.9"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y sqlite3 libsqlite3-dev

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install sqlite

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install poetry
        poetry config virtualenvs.create false
        poetry install --with dev

    - name: Install test dependencies
      run: |
        pip install -r requirements-test.txt

    - name: Lint with ruff
      run: |
        ruff check gibson tests --format=github
        
    - name: Check formatting with black
      run: |
        black --check --diff gibson tests

    - name: Type check with mypy
      run: |
        mypy gibson --ignore-missing-imports

    - name: Run unit tests
      run: |
        pytest tests/unit -v --tb=short --cov=gibson --cov-report=xml --cov-report=term-missing

    - name: Run integration tests
      run: |
        pytest tests/integration -v --tb=short

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Generate test report
      if: always()
      run: |
        pytest tests --html=reports/pytest_report.html --self-contained-html --json-report --json-report-file=reports/pytest_report.json
      continue-on-error: true

    - name: Upload test reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-reports-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          reports/
          htmlcov/
          coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry config virtualenvs.create false
        poetry install --with dev

    - name: Run security scan with bandit
      run: |
        bandit -r gibson -f json -o bandit-report.json
      continue-on-error: true

    - name: Run dependency vulnerability check
      run: |
        pip install safety
        safety check --json --output safety-report.json
      continue-on-error: true

    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  performance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry config virtualenvs.create false
        poetry install --with dev
        pip install pytest-benchmark memory-profiler

    - name: Run performance tests
      run: |
        pytest tests -m performance --benchmark-only --benchmark-sort=mean --benchmark-json=benchmark.json
      continue-on-error: true

    - name: Upload performance reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-reports
        path: benchmark.json

  documentation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install sphinx sphinx-rtd-theme myst-parser

    - name: Build documentation
      run: |
        cd docs && make html
      continue-on-error: true

    - name: Test documentation
      run: |
        cd docs && make doctest
      continue-on-error: true

  mutation-testing:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' # Only run on scheduled builds
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry mutmut
        poetry config virtualenvs.create false
        poetry install --with dev

    - name: Run mutation testing
      run: |
        mutmut run --paths-to-mutate gibson --tests-dir tests
      continue-on-error: true

    - name: Generate mutation report
      run: |
        mutmut junitxml > mutation-report.xml
      continue-on-error: true

    - name: Upload mutation report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: mutation-report
        path: mutation-report.xml

  test-summary:
    runs-on: ubuntu-latest
    needs: [test, security, performance]
    if: always()
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3

    - name: Create test summary
      run: |
        echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Unit & Integration Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Performance Tests | ${{ needs.performance.result }} |" >> $GITHUB_STEP_SUMMARY
        
        if [ -d "test-reports-ubuntu-latest-3.11" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "Coverage details are available in the test artifacts." >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -f "security-reports/bandit-report.json" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Report" >> $GITHUB_STEP_SUMMARY
          echo "Security scan results are available in the security artifacts." >> $GITHUB_STEP_SUMMARY
        fi