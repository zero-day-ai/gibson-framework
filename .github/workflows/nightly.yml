name: Nightly Build

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  nightly-build:
    name: Build Nightly Release
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
      
      - name: Get nightly version
        id: version
        run: |
          BASE_VERSION=$(poetry version -s)
          NIGHTLY_VERSION="${BASE_VERSION}.dev$(date +%Y%m%d)"
          echo "NIGHTLY_VERSION=${NIGHTLY_VERSION}" >> $GITHUB_OUTPUT
          echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
      
      - name: Update version for nightly
        run: |
          poetry version ${{ steps.version.outputs.NIGHTLY_VERSION }}
      
      - name: Install dependencies
        run: |
          poetry install --no-interaction --with dev
      
      - name: Run tests
        run: |
          poetry run pytest tests/ -v --tb=short
        continue-on-error: true
      
      - name: Build package
        run: |
          poetry build
      
      - name: Build standalone binary
        run: |
          poetry run python -m nuitka \
            --standalone \
            --onefile \
            --output-dir=dist \
            --output-filename=gibson-nightly-linux-amd64 \
            --include-package=gibson \
            --enable-plugin=anti-bloat \
            --assume-yes-for-downloads \
            src/gibson/main.py
      
      - name: Create nightly tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -f nightly
          git push -f origin nightly
      
      - name: Update nightly release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: Nightly Build ${{ steps.version.outputs.DATE }}
          body: |
            # Gibson CLI Nightly Build
            
            **Date:** ${{ steps.version.outputs.DATE }}  
            **Version:** ${{ steps.version.outputs.NIGHTLY_VERSION }}
            
            ## ⚠️ Warning
            
            This is an automated nightly build and may be unstable. Use at your own risk.
            
            ## Recent Changes
            
            See the [commit history](https://github.com/zero-day-ai/gibson-cli/commits/main) for recent changes.
            
            ## Installation
            
            ### Direct Download
            Download the binary below and make it executable:
            ```bash
            chmod +x gibson-nightly-linux-amd64
            ./gibson-nightly-linux-amd64 --version
            ```
            
            ### Python Package
            ```bash
            pip install --pre gibson-cli==${{ steps.version.outputs.NIGHTLY_VERSION }}
            ```
          
          draft: false
          prerelease: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}