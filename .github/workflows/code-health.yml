name: Code Health Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      create_pr:
        description: 'Create cleanup PR for expired code'
        required: false
        default: 'false'

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install Gibson
        run: |
          pip install poetry
          poetry install
      
      - name: Run Code Health Check
        id: health_check
        run: |
          # Run health check and save output
          poetry run gibson health check . --format json > health_report.json
          
          # Extract metrics for summary
          TOTAL_ISSUES=$(jq '. | length' health_report.json)
          echo "total_issues=$TOTAL_ISSUES" >> $GITHUB_OUTPUT
          
          # Generate markdown report
          poetry run gibson health check . > health_report.md
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('health_report.md', 'utf8');
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Code Health Report')
            );
            
            const body = `## 🔍 Code Health Report\n\n${report}\n\n---\n*Generated by Gibson Code Health System*`;
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
      
      - name: Upload Health Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: code-health-report
          path: |
            health_report.json
            health_report.md
      
      - name: Check for failures
        if: steps.health_check.outputs.total_issues > 50
        run: |
          echo "⚠️ High number of code health issues detected: ${{ steps.health_check.outputs.total_issues }}"
          echo "Run 'gibson health check' locally for details"
      
      - name: Create Cleanup PR
        if: |
          (github.event_name == 'schedule' || github.event.inputs.create_pr == 'true') &&
          github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # This would normally run the decay tracker and create PR
          # For now, just log what would happen
          echo "Would create cleanup PR for expired code (7+ days unused)"
          # poetry run python -m gibson.core.code_health.cleanup --create-pr

  health-trends:
    runs-on: ubuntu-latest
    needs: health-check
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Download current report
        uses: actions/download-artifact@v3
        with:
          name: code-health-report
      
      - name: Generate trend analysis
        run: |
          # This would compare with historical data
          echo "📊 Code Health Trends"
          echo "====================="
          echo "Current analysis completed"
          echo "Historical comparison would go here"
      
      - name: Update metrics dashboard
        if: github.ref == 'refs/heads/main'
        run: |
          # This would update a metrics dashboard or badge
          echo "Would update metrics dashboard with latest health score"