      fact-checking:
        description: "Fact verification and hallucination detection"
        type: "github-raw"
        urls:
          - "https://raw.githubusercontent.com/gibson-sec/hallucination-db/main/factual-errors.yaml"
          - "https://raw.githubusercontent.com/gibson-sec/hallucination-db/main/confidence-manipulation.yaml"
        size: "~6MB"
        count: 300

  # Insecure Plugin Design Module
  insecure-plugin-design:
    description: "Payloads for testing plugin/extension security"
    sources:
      default:
        description: "Plugin security test payloads"
        type: "embedded"
        urls: []
