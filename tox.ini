[tox]
# Tox configuration for Gibson framework
# Enables testing across multiple Python versions and environments
envlist = py39, py310, py311, py312, lint, type, security, docs
isolated_build = True

[testenv]
# Base test environment configuration
deps = 
    -r{toxinidir}/requirements-test.txt
    pytest>=7.4.3
    pytest-asyncio>=0.21.1
    pytest-cov>=4.1.0
    pytest-mock>=3.12.0
    pytest-xdist>=3.5.0

commands = 
    pytest {posargs:tests} --cov=gibson --cov-report=term-missing --cov-report=xml

passenv = 
    CI
    COVERAGE_*
    PYTEST_*
    PYTHONPATH

setenv =
    COVERAGE_FILE = {envdir}/.coverage
    PYTHONPATH = {toxinidir}

[testenv:py39]
# Python 3.9 specific environment
basepython = python3.9

[testenv:py310]
# Python 3.10 specific environment  
basepython = python3.10

[testenv:py311]
# Python 3.11 specific environment
basepython = python3.11

[testenv:py312]
# Python 3.12 specific environment
basepython = python3.12

[testenv:lint]
# Linting environment
basepython = python3.11
deps = 
    ruff>=0.1.8
    black>=23.12.0
commands = 
    ruff check gibson tests
    black --check --diff gibson tests

[testenv:type]
# Type checking environment
basepython = python3.11
deps = 
    mypy>=1.7.1
    types-PyYAML
    types-requests
    types-setuptools
commands = 
    mypy gibson tests --ignore-missing-imports

[testenv:security]
# Security scanning environment
basepython = python3.11
deps = 
    bandit>=1.7.5
    safety>=2.3.0
commands = 
    bandit -r gibson -f json -o {envdir}/bandit-report.json
    safety check --json --output {envdir}/safety-report.json

[testenv:docs]
# Documentation environment
basepython = python3.11
deps = 
    sphinx>=7.1.0
    sphinx-rtd-theme>=1.3.0
    myst-parser>=2.0.0
commands = 
    sphinx-build -b html docs docs/_build/html
    sphinx-build -b doctest docs docs/_build/doctest

[testenv:coverage]
# Coverage reporting environment
basepython = python3.11
deps = 
    {[testenv]deps}
    coverage[toml]>=7.3.0
commands = 
    coverage run -m pytest tests
    coverage report --show-missing --fail-under=85
    coverage html -d {envdir}/htmlcov
    coverage xml -o {envdir}/coverage.xml

[testenv:integration]
# Integration tests only
basepython = python3.11
commands = 
    pytest tests/integration {posargs} -v --tb=short

[testenv:unit]
# Unit tests only
basepython = python3.11
commands = 
    pytest tests/unit {posargs} -v --tb=short

[testenv:performance]
# Performance testing environment
basepython = python3.11
deps = 
    {[testenv]deps}
    pytest-benchmark>=4.0.0
    memory-profiler>=0.61.0
commands = 
    pytest tests -m performance --benchmark-only --benchmark-sort=mean

[testenv:mutation]
# Mutation testing environment
basepython = python3.11
deps = 
    {[testenv]deps}
    mutmut>=2.4.3
commands = 
    mutmut run --paths-to-mutate gibson

[testenv:clean]
# Cleanup environment
deps = 
skip_install = true
commands = 
    python -c "import shutil, os; [shutil.rmtree(d) if os.path.isdir(d) else os.remove(d) if os.path.exists(d) else None for d in ['.tox', '.pytest_cache', '.coverage', 'htmlcov', '.mypy_cache', '__pycache__']]"

[pytest]
# Pytest configuration for tox
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers 
    --strict-config 
    --tb=short 
    --color=yes
markers =
    unit: Unit tests
    integration: Integration tests  
    slow: Slow tests
    performance: Performance tests
    security: Security tests
    ai: AI/LLM tests

[coverage:run]
# Coverage configuration for tox
source = gibson
omit = 
    */tests/*
    */test_*.py
    gibson/__main__.py
    gibson/main.py
branch = true

[coverage:report]
# Coverage reporting configuration
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
show_missing = true
fail_under = 85