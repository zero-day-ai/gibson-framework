[pytest]
# Simple pytest configuration for Gibson framework

# Test discovery
testpaths = tests

# Output and formatting
console_output_style = progress

# Test execution options
addopts = 
    --strict-markers 
    --strict-config 
    --tb=short
    --color=yes
    --durations=10
    --asyncio-mode=auto

# Timeout settings (requires pytest-timeout plugin)
# timeout = 300
# timeout_method = thread

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Test markers
markers =
    unit: Unit tests that don't require external dependencies
    integration: Integration tests that may require external services
    slow: Tests that take a long time to run
    asyncio: Async tests using pytest-asyncio
    database: Tests that require database setup
    cli: Tests that exercise CLI commands
    mock: Tests that use extensive mocking
    security: Tests related to security functionality
    ai: Tests that involve AI/LLM functionality
    performance: Performance and benchmark tests
    timeout: Tests with custom timeout values

# Minimum version
minversion = 7.0

# Cache
cache_dir = .pytest_cache

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Async test configuration  
asyncio_mode = auto